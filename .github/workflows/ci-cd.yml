name: Deploy to Render

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: logistics_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/logistics_test
          SPRING_DATASOURCE_USERNAME: test_user
          SPRING_DATASOURCE_PASSWORD: test_password

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

      - name: Build JAR
        run: mvn package -DskipTests

  deploy-to-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "RENDER_DEPLOY_HOOK is missing"
            exit 1
          fi

      - name: Trigger Render Deploy
        run: |
          echo "🚀 Triggering deployment on Render..."
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "✅ Deployment triggered successfully!"

  healthcheck:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy-to-render
    if: always() && needs.deploy-to-render.result == 'success'

    steps:
      - name: Wait for deployment
        run: sleep 60

      - name: Check application health
        uses: jtalk/url-health-check-action@v4
        with:
          url: https://${{ secrets.RENDER_URL }}/actuator/health
          follow-redirect: false
          max-attempts: 15
          retry-delay: 10s
          retry-all: true

      - name: Health check result
        run: |
          echo "Job status: ${{ job.status }}"
          if [ "${{ job.status }}" != "success" ]; then
            exit 1
          fi